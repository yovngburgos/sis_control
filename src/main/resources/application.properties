# Nombre de la aplicación
spring.application.name=backend

# --- CONFIGURACIÓN DE BASE DE DATOS ---
# Se agrega createDatabaseIfNotExist y serverTimezone para evitar fallos de conexión
spring.datasource.url=jdbc:mysql://localhost:3306/sis_control?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIÓN JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialecto actualizado para MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- MANEJO DE EXCEPCIONES Y RUTAS ---
# Esto permite que tu GlobalExceptionHandler capture las rutas 404
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false